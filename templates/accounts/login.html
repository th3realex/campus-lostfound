{% extends 'base.html' %}
{% block title %}Login — Campus Lost & Found{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4">
      <h3 class="fw-bold text-center mb-4"><i class="fas fa-sign-in-alt text-primary me-2"></i>Login</h3>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          {{ form.username }}
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          {{ form.password }}
        </div>
        {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login</button>
      </form>
      <p class="text-center mt-3 mb-0">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </div>
  </div>
</div>
{% endblock %}
