{% extends 'base.html' %}
{% block title %}Create Manual Match{% endblock %}
{% block content %}
<div style="max-width:600px;margin:0 auto;" class="animate-up">
  <a href="{% url 'admin_dashboard' %}" class="btn btn-outline btn-sm mb-3"><i class="fas fa-arrow-left"></i> Back</a>
  <div class="section-head mb-3">
    <div><div class="section-title">Create Manual Match</div><div class="section-sub">Manually link a lost item to a found item</div></div>
  </div>
  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Select Lost Item *</label>
          <select name="lost_item" class="form-select" required>
            <option value="">— Select Lost Item —</option>
            {% for item in lost_items %}
            <option value="{{ item.pk }}">{{ item.title }} — {{ item.get_category_display }} ({{ item.reporter.get_full_name }}) — {{ item.date_lost }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Select Found Item *</label>
          <select name="found_item" class="form-select" required>
            <option value="">— Select Found Item —</option>
            {% for item in found_items %}
            <option value="{{ item.pk }}">{{ item.title }} — {{ item.get_category_display }} ({{ item.finder.get_full_name }}) — {{ item.date_found }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Notes (optional)</label>
          <textarea name="notes" class="form-control" rows="3" placeholder="Explain why you think these match..."></textarea>
        </div>
        <div style="display:flex;gap:1rem;">
          <button type="submit" class="btn btn-primary"><i class="fas fa-link"></i> Create Match</button>
          <a href="{% url 'admin_dashboard' %}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
